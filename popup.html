<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserClocks</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🕐 BrowserClocks</h1>
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
    </div>
    
    <div id="clocksList" class="clocks-list">
      <!-- Clocks will be dynamically added here -->
    </div>
    
    <div class="footer">
      <button id="addClockBtn" class="add-btn">+ Add Timezone</button>
    </div>
  </div>
  
  <!-- Add Timezone Modal -->
  <div id="addModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Timezone</h2>
        <button id="closeModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="searchTimezone" placeholder="Search timezone or city..." autocomplete="off">
        <div id="timezoneList" class="timezone-list"></div>
      </div>
    </div>
  </div>
  
  <!-- Edit Alias Modal -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content edit-modal-content">
      <div class="modal-header">
        <h2>Edit Timezone Alias</h2>
        <button id="closeEditModal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <p class="hint">Enter a custom name to display instead of the city name:</p>
        <input type="text" id="aliasInput" placeholder="Enter alias..." autocomplete="off">
        <div class="modal-actions">
          <button id="saveAliasBtn" class="save-btn">Save</button>
          <button id="cancelAliasBtn" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
