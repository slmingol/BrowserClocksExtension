name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from manifest
        id: get_version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"
      
      - name: Create extension package
        run: |
          # Create a clean build directory
          mkdir -p build
          
          # Copy extension files (exclude dev files)
          rsync -av --exclude='.git*' \
                    --exclude='README.md' \
                    --exclude='QUICKSTART.md' \
                    --exclude='build' \
                    --exclude='.github' \
                    --exclude='*.zip' \
                    ./ build/
          
          # Create ZIP file
          cd build
          zip -r ../BrowserClocks-v${{ steps.get_version.outputs.version }}.zip .
          cd ..
          
          # Verify ZIP contents
          echo "ZIP contents:"
          unzip -l BrowserClocks-v${{ steps.get_version.outputs.version }}.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: BrowserClocks-v${{ steps.get_version.outputs.version }}.zip
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: BrowserClocks-v${{ steps.get_version.outputs.version }}.zip
          body: |
            ## BrowserClocks v${{ steps.get_version.outputs.version }}
            
            ### Installation
            1. Download the `BrowserClocks-v${{ steps.get_version.outputs.version }}.zip` file
            2. Unzip the file
            3. Open Chrome/Edge and go to `chrome://extensions/`
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the unzipped folder
            
            ### Features
            - 370+ cities worldwide
            - 120+ airport codes
            - Drag-and-drop reordering
            - Customizable toolbar
            - Country flags
            - Custom aliases
            - Dark theme
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Optional: Publish to Chrome Web Store
      # Uncomment and configure after setting up Chrome Web Store API credentials
      # - name: Publish to Chrome Web Store
      #   if: startsWith(github.ref, 'refs/tags/')
      #   uses: mobilefirstllc/cws-publish@latest
      #   with:
